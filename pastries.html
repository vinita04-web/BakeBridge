{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Pastries</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    padding:20px;
    background:
    linear-gradient(rgba(255,255,255,0.82), rgba(255,255,255,0.82)),
    url("{% static 'images/bg1.jpg' %}");
    background-size:cover;
    background-attachment:fixed;
}

h1{
    text-align:center;
    color:#7a1e48;
    margin-bottom:30px;
    font-size:60px;
}

.container{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    width:240px;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.12);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:15px;
}

.card h3{
    margin-top:15px;
}

.bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
}

.price{
    font-size:24px;
    font-weight:bold;
    color:#7a1e48;
}

button{
    background:#ff4fa3;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:15px;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>Pastries 🍮</h1>

<div class="container">

<div class="card">
<img src="{% static 'images/pastry1.jpg' %}">
<h3>Eggless Butterscotch & Milk Chocolate Pastry</h3>

<div class="bottom">
<div class="price">₹120</div>

<a href="{% url 'add_to_cart' 'Eggless Butterscotch Milk Chocolate Pastry' 120 %}">
<button>ADD To Cart</button>
</a>

</div>
</div>

<div class="card">
<img src="{% static 'images/pastry2.jpg' %}">
<h3>Eggless Rich Chocolate Pastry</h3>

<div class="bottom">
<div class="price">₹140</div>

<a href="{% url 'add_to_cart' 'Eggless Rich Chocolate Pastry' 140 %}">
<button>ADD To Cart</button>
</a>

</div>
</div>

<div class="card">
<img src="{% static 'images/pastry3.jpg' %}">
<h3>Fresh Creame Pineapple Pastry</h3>

<div class="bottom">
<div class="price">₹150</div>

<a href="{% url 'add_to_cart' 'Fresh Cream Pineapple Pastry' 150 %}">
<button>ADD To Cart</button>
</a>
</div>
</div>

<div class="card">
<img src="{% static 'images/pastry4.jpg' %}">
<h3>Dutch Truffle Pastry</h3>

<div class="bottom">
<div class="price">₹170</div>

<a href="{% url 'add_to_cart' 'Dutch Truffle Pastry' 170 %}">
<button>ADD To Cart</button>
</a>
</div>
</div>

</div>

</body>
</html>
