{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    font-family:'Poppins';
    background: url("{% static 'images/bg1.jpg' %}") no-repeat center;
    background-size: cover;
    background-attachment: fixed;
    color:white;
    text-align:center;
    padding-top:100px;
}

form {
    display:inline-block;
    background: rgba(255,255,255,0.1);
    padding:30px;
    border-radius:20px;
    backdrop-filter: blur(10px);
}

input {
    margin:10px;
    padding:10px;
    border-radius:10px;
}

button {
    background:#ff69b4;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:20px;
}
</style>
</head>

<body>

<h2>Login</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username"><br>
    <input type="password" name="password" placeholder="Password"><br>
    <button type="submit">Login</button>
</form>

</body>
</html>
