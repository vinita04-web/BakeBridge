{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Cakes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    padding:20px;

    background:
    linear-gradient(rgba(255,255,255,0.82), rgba(255,255,255,0.82)),
    url("{% static 'images/bg1.jpg' %}");

    background-size:cover;
    background-attachment:fixed;
}

h1{
    text-align:center;
    color:#7a1e48;
    margin-bottom:30px;
    font-size:60px;
}

.container{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    width:240px;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.12);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:15px;
}

.card h3{
    margin-top:15px;
    color:#333;
}

.bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
}

.price{
    font-size:24px;
    font-weight:bold;
    color:#7a1e48;
}

button{
    background:#ff4fa3;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:15px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#7a1e48;
}

</style>
</head>

<body>

<h1>Cakes 🎂</h1>

<div class="container">

<div class="card">
<img src="{% static 'images/cake1.jpg' %}">
<h3>Chocolate Cake</h3>

<div class="bottom">
<div class="price">₹500</div>

<a href="{% url 'add_to_cart' 'Chocolate Cake' 500 %}">
<button>ADD To Cart</button>
</a>

</div>
</div>

<div class="card">
<img src="{% static 'images/cake2.jpg' %}">
<h3>Red Velvet Cake</h3>

<div class="bottom">
<div class="price">₹450</div>

<a href="{% url 'add_to_cart' 'Red Velvet Cake' 450 %}">
<button>ADD To Cart</button>
</a>

</div>
</div>

<div class="card">
<img src="{% static 'images/cake3.jpg' %}">
<h3>Black Forest Cake</h3>

<div class="bottom">
<div class="price">₹550</div>

<a href="{% url 'add_to_cart' 'Black Forest Cake' 550 %}">
<button>ADD To Cart</button>
</a>

</div>
</div>


</div>

</body>
</html>
